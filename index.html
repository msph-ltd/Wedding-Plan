<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M & H · Wedding Ops Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT / TOKENS
   ============================================================ */
:root {
  --bg:          #f7f4ee;
  --bg2:         #f0ece3;
  --panel:       rgba(255,255,255,0.72);
  --panel-solid: rgba(255,255,255,0.92);
  --text:        #2a2825;
  --muted:       #6b6760;
  --sage:        #8aa38d;
  --sage-deep:   #6b8a6f;
  --sage-pale:   rgba(138,163,141,0.12);
  --champagne:   #d8c7a1;
  --champ-pale:  rgba(216,199,161,0.18);
  --line:        rgba(138,163,141,0.18);
  --line-hard:   rgba(138,163,141,0.30);
  --shadow-soft: 0 4px 24px rgba(60,70,60,0.07);
  --shadow-card: 0 8px 32px rgba(60,70,60,0.09);
  --radius-sm:   12px;
  --radius-md:   20px;
  --radius-lg:   28px;
  --danger:      #b5766a;
  --warning:     #c09856;
  --success:     #6b8a6f;
  --info:        #7a9bb5;
}

/* ============================================================
   RESET / BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background:
    radial-gradient(ellipse at 0% 0%, rgba(138,163,141,0.16) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 0%, rgba(216,199,161,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(216,199,161,0.10) 0%, transparent 40%),
    linear-gradient(160deg, #faf8f3 0%, #f4f0e8 60%, #ede9df 100%);
  min-height: 100vh;
}

/* ============================================================
   HEADER / NAV
   ============================================================ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,244,238,0.88);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid var(--line);
  padding: 20px 32px 0;
}
.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1;
}
.header h1 em { font-style: italic; color: var(--sage-deep); }
.header-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 16px;
  padding-bottom: 1px;
}
.tab {
  padding: 9px 18px;
  border-radius: 999px 999px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.18s ease;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.tab:hover { color: var(--text); background: rgba(138,163,141,0.08); }
.tab.active {
  background: var(--bg);
  color: var(--sage-deep);
  border-color: var(--line);
  font-weight: 600;
}
.tab.groom-tab {
  color: #888;
  margin-left: 8px;
  border-left: 1px solid var(--line-hard);
  padding-left: 18px;
}
.tab.groom-tab:hover { color: #c0392b; }
.tab.groom-tab.active { color: #e74c3c; background: #111; border-color: #333; }

/* ============================================================
   MAIN / PAGES
   ============================================================ */
.main { padding: 32px; max-width: 1440px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* ============================================================
   GRID
   ============================================================ */
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
.col-3  { grid-column: span 3; }
.col-4  { grid-column: span 4; }
.col-5  { grid-column: span 5; }
.col-6  { grid-column: span 6; }
.col-7  { grid-column: span 7; }
.col-8  { grid-column: span 8; }
.col-9  { grid-column: span 9; }
.col-12 { grid-column: span 12; }

/* ============================================================
   CARD
   ============================================================ */
.card {
  background: var(--panel);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 28px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 60%);
  pointer-events: none;
}
.card-sm { padding: 20px; border-radius: var(--radius-md); }

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.serif { font-family: 'Cormorant Garamond', serif; }
h2.card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; margin-bottom: 18px; line-height: 1.1; }
h3.section-head { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin-bottom: 14px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.kpi { font-size: 40px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
.kpi-sm { font-size: 28px; font-weight: 700; }

/* ============================================================
   BADGES / TAGS
   ============================================================ */
.badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--sage-pale);
  color: var(--sage-deep);
  border: 1px solid rgba(138,163,141,0.20);
  margin: 2px;
}
.badge.champagne { background: var(--champ-pale); color: #9a7c3e; border-color: rgba(216,199,161,0.30); }
.badge.warning   { background: rgba(192,152,86,0.12); color: var(--warning); border-color: rgba(192,152,86,0.20); }
.badge.danger    { background: rgba(181,118,106,0.12); color: var(--danger); border-color: rgba(181,118,106,0.20); }
.badge.info      { background: rgba(122,155,181,0.12); color: var(--info); border-color: rgba(122,155,181,0.20); }
.badge.success   { background: rgba(107,138,111,0.12); color: var(--success); border-color: rgba(107,138,111,0.20); }
.badge.dark      { background: rgba(42,40,37,0.08); color: var(--text); border-color: rgba(42,40,37,0.12); }

/* Status badge helpers */
.status-complete  { background: rgba(107,138,111,0.14); color: #4d7551; border-color: rgba(107,138,111,0.22); }
.status-today     { background: rgba(192,152,86,0.18); color: #8a6520; border-color: rgba(192,152,86,0.28); }
.status-upcoming  { background: var(--sage-pale); color: var(--sage-deep); border-color: rgba(138,163,141,0.20); }
.status-tbc       { background: rgba(181,118,106,0.10); color: var(--danger); border-color: rgba(181,118,106,0.18); }

/* ============================================================
   ITEMS / LIST ROWS
   ============================================================ */
.item-row {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  background: var(--panel-solid);
  border: 1px solid var(--line);
  margin-bottom: 10px;
}
.item-row:last-child { margin-bottom: 0; }
.item-row strong { font-weight: 600; }

/* ============================================================
   DIVIDERS
   ============================================================ */
.divider { border: none; border-top: 1px solid var(--line); margin: 20px 0; }

/* ============================================================
   TIMELINE ROWS
   ============================================================ */
.tl-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  align-items: start;
}
.tl-row:last-child { border-bottom: none; }
.tl-time { font-weight: 700; color: var(--sage-deep); font-size: 14px; font-variant-numeric: tabular-nums; }
.tl-content strong { display: block; font-weight: 600; }
.tl-content .small { margin-top: 3px; }

/* ============================================================
   CALLOUT / HIGHLIGHT BOX
   ============================================================ */
.callout {
  padding: 18px 20px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(138,163,141,0.10), rgba(216,199,161,0.12));
  border: 1px solid var(--line);
}
.callout-urgent {
  background: linear-gradient(135deg, rgba(216,199,161,0.18), rgba(192,152,86,0.12));
  border-color: rgba(192,152,86,0.22);
}
.callout-live {
  background: linear-gradient(135deg, rgba(107,138,111,0.18), rgba(138,163,141,0.10));
  border-color: rgba(107,138,111,0.28);
  animation: pulse-border 2s ease-in-out infinite;
}
@keyframes pulse-border {
  0%, 100% { border-color: rgba(107,138,111,0.28); }
  50%       { border-color: rgba(107,138,111,0.55); }
}

/* ============================================================
   COUNTDOWN
   ============================================================ */
.countdown-wrap {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.countdown-unit {
  text-align: center;
  background: var(--panel-solid);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  min-width: 64px;
}
.countdown-num { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--sage-deep); line-height: 1; }
.countdown-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

/* ============================================================
   ACCORDION (Events page)
   ============================================================ */
.accordion-item {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--panel);
  backdrop-filter: blur(8px);
  box-shadow: var(--shadow-soft);
  margin-bottom: 12px;
  overflow: hidden;
  transition: box-shadow 0.2s ease;
}
.accordion-item:hover { box-shadow: var(--shadow-card); }
.accordion-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 22px 24px;
  cursor: pointer;
  user-select: none;
}
.accordion-header:hover { background: rgba(138,163,141,0.04); }
.accordion-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; }
.accordion-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; line-height: 1.1; }
.accordion-date { font-size: 13px; color: var(--muted); margin-top: 4px; }
.accordion-chevron {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--sage-pale);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.25s ease, background 0.2s;
  font-size: 14px;
  color: var(--sage-deep);
}
.accordion-item.open .accordion-chevron { transform: rotate(180deg); background: var(--sage); color: white; border-color: var(--sage); }
.accordion-body {
  display: none;
  padding: 0 24px 24px;
  border-top: 1px solid var(--line);
}
.accordion-item.open .accordion-body { display: block; }
.accordion-body-inner { padding-top: 20px; }

/* Accordion subsections */
.event-section { margin-bottom: 24px; }
.event-section:last-child { margin-bottom: 0; }
.event-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.event-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.event-stat {
  background: var(--panel-solid);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.event-stat .label { display: block; margin-bottom: 4px; }
.event-stat strong { font-size: 15px; }

/* ============================================================
   TABLE
   ============================================================ */
.table { width: 100%; border-collapse: collapse; font-size: 14px; }
.table th {
  text-align: left; padding: 10px 12px;
  border-bottom: 2px solid var(--line);
  color: var(--muted); font-weight: 600;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
}
.table td { padding: 12px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: rgba(138,163,141,0.04); }

/* ============================================================
   PEOPLE CARDS
   ============================================================ */
.people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.person-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  box-shadow: var(--shadow-soft);
  transition: box-shadow 0.18s;
}
.person-card:hover { box-shadow: var(--shadow-card); }
.person-card.hidden-card { display: none; }
.person-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.person-role { font-size: 13px; color: var(--muted); margin: 3px 0 10px; }
.person-detail { font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
.person-tags { display: flex; flex-wrap: wrap; gap: 4px; }

/* Filter bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
  align-items: center;
}
.filter-btn {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel-solid);
  font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
  color: var(--muted);
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

/* ============================================================
   TRANSPORT CARDS
   ============================================================ */
.transport-event {
  background: var(--panel-solid);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 20px 22px;
  margin-bottom: 14px;
}
.transport-event-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.transport-flow {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0;
}
.flow-node {
  background: var(--sage-pale);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px; font-weight: 500;
}
.flow-arrow { color: var(--muted); font-size: 16px; }
.car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 12px; }
.car-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.car-card .car-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.car-card .car-passengers { font-size: 13px; color: var(--muted); }

/* ============================================================
   GROOM SECTION — DARK THEME
   ============================================================ */
.groom-mode body, body.groom-mode {
  /* applied via class on body */
}
#page-groom {
  --g-bg:     #0d0d0d;
  --g-panel:  rgba(28,28,28,0.92);
  --g-panel2: rgba(38,38,38,0.85);
  --g-red:    #c0392b;
  --g-red2:   #e74c3c;
  --g-gold:   #c0914c;
  --g-text:   #e8e6e1;
  --g-muted:  #888580;
  --g-line:   rgba(255,255,255,0.08);
  --g-glow:   0 0 40px rgba(192,57,43,0.15);
  background: radial-gradient(ellipse at 30% 0%, rgba(192,57,43,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 100%, rgba(192,57,43,0.05) 0%, transparent 40%),
              linear-gradient(160deg, #101010 0%, #0a0a0a 100%);
  min-height: 80vh;
  border-radius: var(--radius-lg);
  padding: 32px;
  color: var(--g-text);
  position: relative;
  overflow: hidden;
}
#page-groom::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px; right: -1px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--g-red), var(--g-gold), var(--g-red), transparent);
  border-radius: 3px 3px 0 0;
}

/* Groom lock screen */
.groom-lock {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  gap: 24px;
}
.groom-lock .lock-icon {
  font-size: 48px;
  width: 96px; height: 96px;
  border-radius: 50%;
  background: rgba(192,57,43,0.12);
  border: 1px solid rgba(192,57,43,0.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 40px rgba(192,57,43,0.1);
}
.groom-lock h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: #e8e6e1;
}
.groom-lock p { color: #888; font-size: 14px; }
.groom-lock .pw-wrap {
  display: flex;
  gap: 10px;
  align-items: center;
}
.groom-lock input[type=password] {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 15px;
  color: #e8e6e1;
  outline: none;
  width: 220px;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s;
}
.groom-lock input[type=password]:focus { border-color: rgba(192,57,43,0.5); }
.groom-lock .pw-btn {
  background: linear-gradient(135deg, #c0392b, #96281b);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: opacity 0.2s;
}
.groom-lock .pw-btn:hover { opacity: 0.88; }
.groom-lock .pw-error { color: #e74c3c; font-size: 13px; display: none; }

/* Groom inner content */
.groom-inner { display: none; }
.groom-inner.unlocked { display: block; }

.g-card {
  background: var(--g-panel);
  border: 1px solid var(--g-line);
  border-radius: var(--radius-md);
  padding: 24px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
  box-shadow: var(--g-glow);
  position: relative;
  overflow: hidden;
}
.g-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
}
.g-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  color: #e8e6e1;
  margin-bottom: 16px;
}
.g-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--g-red);
  margin-bottom: 6px;
  display: block;
}
.g-muted { color: #888; }
.g-tl-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--g-line);
  align-items: start;
}
.g-tl-row:last-child { border-bottom: none; }
.g-tl-time { font-weight: 700; color: var(--g-red); font-size: 13px; font-variant-numeric: tabular-nums; }
.g-tl-text { color: #ccc; font-size: 14px; }
.g-checklist { list-style: none; }
.g-check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--g-line);
  font-size: 14px;
  color: #ccc;
}
.g-check-item:last-child { border-bottom: none; }
.g-check-box {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1px solid rgba(192,57,43,0.4);
  flex-shrink: 0;
  background: rgba(192,57,43,0.06);
  cursor: pointer;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.g-check-box.checked { background: var(--g-red); border-color: var(--g-red); }
.g-check-box.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
.g-check-item.done span { text-decoration: line-through; color: #555; }
.g-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g-badge {
  display: inline-flex;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: rgba(192,57,43,0.15);
  color: var(--g-red2);
  border: 1px solid rgba(192,57,43,0.22);
  margin: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.g-note {
  background: rgba(192,57,43,0.06);

  font-size: 13px;

  background: rgba(255,255,255,0.04);

  font-size: 13px;

  align-items: center;

.g-hug-num {
  width: 22px; height: 22px;

/* ============================================================
   PAGE INTROS
   ============================================================ */
.page-intro {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 28px;
  max-width: 680px;
  line-height: 1.65;
}

/* ============================================================
   NEXT EVENT CARD (Dashboard)
   ============================================================ */
.next-event-card {
  background: linear-gradient(135deg, rgba(138,163,141,0.10), rgba(216,199,161,0.14));
  border: 1px solid var(--line-hard);
  border-radius: var(--radius-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
}
.next-event-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage), var(--champagne), var(--sage-deep));
  border-radius: 3px 3px 0 0;
}
.next-event-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; margin-bottom: 6px; }
.next-event-meta { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

/* ============================================================
   PRINT / VENDOR PLACEHOLDER
   ============================================================ */
.placeholder-block {
  text-align: center;
  padding: 60px 40px;
  color: var(--muted);
}
.placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.placeholder-block h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text); margin-bottom: 8px; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1100px) {
  .col-3, .col-4, .col-5, .col-6, .col-7, .col-8, .col-9 { grid-column: span 12; }
  .event-grid, .event-grid-3, .g-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .header { padding: 16px 20px 0; }
  .header h1 { font-size: 28px; }
  .main { padding: 20px 16px; }
  .tl-row { grid-template-columns: 90px 1fr; gap: 12px; }
  .g-tl-row { grid-template-columns: 110px 1fr; }
  .accordion-header { padding: 18px; }
  .accordion-body { padding: 0 18px 18px; }
  .car-grid { grid-template-columns: 1fr 1fr; }
  .countdown-wrap { gap: 8px; }
  .countdown-num { font-size: 24px; }
  #page-groom { padding: 20px 16px; }
}
@media (max-width: 480px) {
  .people-grid { grid-template-columns: 1fr; }
  .car-grid { grid-template-columns: 1fr; }
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,28,24,0.52);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 500;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal-panel {
  background: linear-gradient(160deg, #faf8f3, #f4f0e8);
  border: 1px solid rgba(255,255,255,0.85);
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 80px rgba(40,50,40,0.22);
  width: 100%;
  max-width: 660px;
  position: relative;
  overflow: hidden;
  animation: modal-slide-in 0.22s ease;
}
@keyframes modal-slide-in {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage), var(--champagne), var(--sage-deep));
}
.modal-close {
  position: absolute;
  top: 16px; right: 18px;
  background: rgba(138,163,141,0.12);
  border: 1px solid var(--line);
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.modal-close:hover { background: var(--sage); color: white; border-color: var(--sage); }
.modal-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--line);
}
.modal-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; line-height: 1; }
.modal-role { font-size: 13px; color: var(--muted); margin-top: 5px; }
.modal-body { padding: 24px 28px 28px; }
.modal-section { margin-bottom: 24px; }
.modal-section:last-child { margin-bottom: 0; }
.modal-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  padding-bottom: 8px; border-bottom: 1px solid var(--line);
  margin-bottom: 12px;
}
.task-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
}
.task-row:last-child { border-bottom: none; }
.task-priority {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.priority-high   { background: var(--danger); }
.priority-medium { background: var(--warning); }
.priority-low    { background: var(--sage); }
.task-event-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--sage-deep);
  margin-bottom: 2px;
}
.car-assignment-row {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  background: var(--panel-solid);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  font-size: 13px;
}
.car-assignment-row:last-child { margin-bottom: 0; }
.car-event-name { font-weight: 600; flex: 1; }
.car-detail { color: var(--muted); font-size: 12px; }
.person-card { cursor: pointer; transition: box-shadow 0.18s, transform 0.15s; }
.person-card:hover { box-shadow: var(--shadow-card); transform: translateY(-2px); }
.person-card-hint { font-size: 11px; color: var(--sage-deep); margin-top: 10px; font-weight: 600; letter-spacing: 0.05em; }

  display: grid;

/* ============================================================
   COUNTDOWN LOGIC
   ============================================================ */
function getCountdown(targetDateISO, targetTimeStr) {
  const now = new Date();
  // Build target from ISO date + time string like "5:00 PM"
  const [datePart] = targetDateISO.split('T');
  let target;
  if (targetTimeStr && targetTimeStr !== 'TBC') {
    target = new Date(datePart + 'T' + to24h(targetTimeStr));
  } else {
    target = new Date(datePart + 'T12:00:00');
  }
  const diff = target - now;
  if (diff <= 0) return null; // past
  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  return { days, hours, minutes, diff };
}

function to24h(timeStr) {
  if (!timeStr || timeStr === 'TBC') return '12:00:00';
  const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!match) return '12:00:00';
  let h = parseInt(match[1]);
  const m = match[2];
  const ampm = match[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${m}:00`;
}

function countdownHTML(cd) {
  if (!cd) return '<div class="badge success">Complete / Past</div>';
  return `
    <div class="countdown-wrap">
      <div class="countdown-unit"><div class="countdown-num">${cd.days}</div><div class="countdown-label">Days</div></div>
      <div class="countdown-unit"><div class="countdown-num">${cd.hours}</div><div class="countdown-label">Hrs</div></div>
      <div class="countdown-unit"><div class="countdown-num">${cd.minutes}</div><div class="countdown-label">Min</div></div>
    </div>
  `;
}

function getNextEvent() {
  const now = new Date();
  for (const e of DATA.events) {
    const eventDate = new Date(e.dateISO + 'T23:59:00');
    if (eventDate >= now) return e;
  }
  return DATA.events[DATA.events.length - 1];
}

/* ============================================================
   RENDER: MASTER TIMELINE
   ============================================================ */
function renderTimeline() {
  // Merge events and arrivals into one sorted list
  const entries = [];
  DATA.events.forEach(e => entries.push({ type: 'event', dateISO: e.dateISO, data: e }));
  DATA.arrivals.forEach(a => entries.push({ type: 'arrival', dateISO: a.dateISO, data: a }));
  // Sort by date; arrivals come before events on same date
  entries.sort((a,b) => {
    const dateCmp = a.dateISO.localeCompare(b.dateISO);
    if (dateCmp !== 0) return dateCmp;
    if (a.type === 'arrival' && b.type !== 'arrival') return -1;
    if (b.type === 'arrival' && a.type !== 'arrival') return 1;
    return 0;
  });

  const rows = entries.map((entry, i) => {
    if (entry.type === 'arrival') {
      const a = entry.data;
      return `
        <div class="arrival-row" style="${i===0?'padding-top:0':''}">
          <div>
            <div class="tl-time">${a.dateLabel}</div>
            <div style="margin-top:4px"><span class="arrival-badge">Arrival</span></div>
          </div>
          <div class="tl-content">
            <strong style="color:var(--sage-deep)">✈ ${a.who}</strong>
            <div class="small muted" style="margin-top:3px">${a.note}</div>
          </div>
        </div>
      `;
    } else {
      const e = entry.data;
      return `
        <div class="tl-row" style="${i===0?'padding-top:0':''}">
          <div class="tl-time">${e.date.split(' ').slice(0,3).join(' ')}</div>
          <div class="tl-content">
            <strong>${e.name}</strong>
            <div class="small muted">${e.venue}${e.venueAddress ? ' · ' + e.venueAddress : ''}</div>
            <div class="small" style="margin-top:4px">
              Public: <strong>${e.publicStart}</strong> &nbsp;·&nbsp; Internal: <strong>${e.internalArrival}</strong>
            </div>
            ${e.departureAnchor && e.departureAnchor !== 'N/A — home event' ? `<div class="small muted" style="margin-top:2px">Departure: ${e.departureAnchor}</div>` : ''}
            <div style="margin-top:6px">${['tbc','placeholder'].some(s=>e.statusLabel.toLowerCase().includes(s))?`<span class="badge warning">${e.statusLabel}</span>`:`<span class="badge">${e.statusLabel}</span>`}</div>
          </div>
        </div>
      `;
    }
  }).join('');

  document.getElementById('page-timeline').innerHTML = `
    <p class="page-intro">Chronological overview of the full wedding week — events and key arrivals merged into one view.</p>
    <div class="card">
      <h2 class="card-title">Wedding Week — Master Timeline</h2>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-size:12px">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--sage);margin-right:5px;vertical-align:middle"></span>Event</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(138,163,141,0.25);margin-right:5px;vertical-align:middle"></span>Arrival</span>
      </div>
      ${rows}
    </div>
  `;
}

/* ============================================================
   PERSON CAR LOOKUP
   ============================================================ */
function getPersonCars(name) {
  const results = [];
  DATA.events.forEach(e => {
    if (!e.transport || !e.transport.cars) return;
    e.transport.cars.forEach(car => {
      const note = (car.note || car.passengers || '');
      // Match whole word / name segment (case-insensitive)
      const nameShort = name.split(' ')[0]; // use first name for fuzzy match
      if (note.toLowerCase().includes(name.toLowerCase()) ||
          note.toLowerCase().includes(nameShort.toLowerCase())) {
        results.push({ event: e.name, date: e.date.split(' ').slice(0,3).join(' '), car: car.name, passengers: note });
      }
    });
  });
  // Deduplicate by event+car
  const seen = new Set();
  return results.filter(r => {
    const key = r.event + r.car;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

/* ============================================================
   PERSON DETAIL MODAL
   ============================================================ */
function showPersonDetail(name) {
  const person = DATA.people.find(p => p.name === name);
  if (!person) return;

  const tasks = DATA.personTasks[name] || [];
  const cars  = getPersonCars(name);
  const hasTasks = tasks.length > 0;
  const hasCars  = cars.length > 0;

  // Header
  document.getElementById('person-modal-header').innerHTML = `
    <div class="modal-name">${person.name}</div>
    <div class="modal-role">${person.role}</div>
    <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px">
      ${person.tags.map(t => `<span class="badge">${t}</span>`).join('')}
    </div>
    ${person.detail ? `<div style="margin-top:12px;font-size:13px;color:var(--muted);line-height:1.6">${person.detail}</div>` : ''}
  `;

  // Body
  let body = '';

  // Tasks section
  body += `<div class="modal-section">
    <div class="modal-section-title">Tasks & Responsibilities ${hasTasks ? `<span style="color:var(--danger)">${tasks.length} item${tasks.length>1?'s':''}</span>` : ''}</div>`;
  if (hasTasks) {
    const priorityOrder = { high: 0, medium: 1, low: 2 };
    const sorted = [...tasks].sort((a,b) => (priorityOrder[a.priority]||1) - (priorityOrder[b.priority]||1));
    body += sorted.map(t => `
      <div class="task-row">
        <div class="task-priority priority-${t.priority}"></div>
        <div>
          <div class="task-event-label">${t.event}</div>
          <div>${t.task}</div>
        </div>
      </div>
    `).join('');
  } else {
    body += `<div style="font-size:13px;color:var(--muted);padding:8px 0">No specific tasks assigned yet for this person.</div>`;
  }
  body += `</div>`;

  // Priority legend
  if (hasTasks) {
    body += `<div style="display:flex;gap:14px;margin-bottom:24px;font-size:12px;color:var(--muted)">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:5px"></span>High priority</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warning);margin-right:5px"></span>Medium</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sage);margin-right:5px"></span>Low</span>
    </div>`;
  }

  // Car assignments section
  body += `<div class="modal-section">
    <div class="modal-section-title">Car Assignments ${hasCars ? `<span style="color:var(--sage-deep)">${cars.length} event${cars.length>1?'s':''}</span>` : ''}</div>`;
  if (hasCars) {
    body += cars.map(c => `
      <div class="car-assignment-row">
        <span style="font-size:18px">🚗</span>
        <div style="flex:1">
          <div class="car-event-name">${c.event} <span class="car-detail">· ${c.date}</span></div>
          <div class="car-detail" style="margin-top:2px"><strong>${c.car}</strong></div>
          <div class="car-detail" style="margin-top:2px">${c.passengers}</div>
        </div>
      </div>
    `).join('');
  } else {
    body += `<div style="font-size:13px;color:var(--muted);padding:8px 0">No car assignment found — may be making own way or not attending driving events.</div>`;
  }
  body += `</div>`;

  document.getElementById('person-modal-body').innerHTML = body;
  document.getElementById('person-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleGroomTask(i) {
  const item = document.getElementById('gtask-' + i);

  if (isDone) {
    box.classList.remove('checked');
    item.classList.remove('done');
    item.querySelector('span').style.textDecoration = '';
  } else {
    box.classList.add('checked');
    item.classList.add('done');
    item.querySelector('span').style.textDecoration = 'line-through';
    item.querySelector('span').style.opacity = '0.45';
  }
}
