<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stone & Sage Wedding Ops Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ee;
  --panel: rgba(255,255,255,0.72);
  --panel-strong: rgba(255,255,255,0.88);
  --text: #2f2d29;
  --muted: #6f6b63;
  --sage: #8aa38d;
  --sage-deep: #6f8b73;
  --champagne: #d8c7a1;
  --line: rgba(111,139,115,0.18);
  --shadow: 0 10px 30px rgba(80, 90, 80, 0.08);
  --danger: #b8786b;
  --warning: #c19b5d;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(138,163,141,0.18), transparent 40%),
    radial-gradient(circle at top right, rgba(216,199,161,0.20), transparent 35%),
    linear-gradient(180deg, #faf8f4 0%, #f4f1ea 100%);
}
.header {
  padding: 28px 32px;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(247,244,238,0.82);
  z-index: 20;
}
.header h1 {
  margin: 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 600;
}
.header p {
  margin: 6px 0 0;
  color: var(--muted);
}
.nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 18px;
}
.tab {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
}
.tab.active {
  background: linear-gradient(135deg, #8aa38d, #a9c0ab);
  color: white;
  border: none;
}
.main {
  padding: 32px;
  max-width: 1440px;
  margin: 0 auto;
}
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}
.card {
  background: var(--panel);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 24px;
}
.card h2, .card h3, .card h4 {
  margin: 0 0 14px;
  font-family: 'Cormorant Garamond', serif;
}
.card h2 { font-size: 30px; }
.card h3 { font-size: 24px; }
.card h4 { font-size: 20px; }
.span-3 { grid-column: span 3; }
.span-4 { grid-column: span 4; }
.span-5 { grid-column: span 5; }
.span-6 { grid-column: span 6; }
.span-7 { grid-column: span 7; }
.span-8 { grid-column: span 8; }
.span-9 { grid-column: span 9; }
.span-12 { grid-column: span 12; }
.kpi {
  font-size: 34px;
  font-weight: 700;
  margin-top: 10px;
}
.small { color: var(--muted); font-size: 13px; }
.muted { color: var(--muted); }
.list { display: grid; gap: 12px; }
.item {
  padding: 14px 16px;
  border-radius: 18px;
  background: var(--panel-strong);
  border: 1px solid var(--line);
}
.item strong { display: inline-block; margin-bottom: 4px; }
.hidden { display: none; }
.table { width: 100%; border-collapse: collapse; }
.table th, .table td {
  text-align: left;
  padding: 12px 10px;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
  vertical-align: top;
}
.table th { color: var(--muted); font-weight: 600; }
.badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(138,163,141,0.16);
  color: var(--sage-deep);
  font-size: 12px;
  font-weight: 600;
  margin-right: 8px;
  margin-bottom: 6px;
}
.badge.warning {
  background: rgba(193,155,93,0.16);
  color: var(--warning);
}
.badge.danger {
  background: rgba(184,120,107,0.15);
  color: var(--danger);
}
.section-title {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: baseline;
  margin-bottom: 16px;
}
.timeline-row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.timeline-row:last-child { border-bottom: 0; }
.time {
  font-weight: 700;
  color: var(--sage-deep);
}
.callout {
  padding: 16px 18px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(138,163,141,0.14), rgba(216,199,161,0.14));
  border: 1px solid var(--line);
}
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.page-intro {
  margin-bottom: 20px;
  color: var(--muted);
}
@media (max-width: 1000px) {
  .span-3, .span-4, .span-5, .span-6, .span-7, .span-8, .span-9, .span-12 { grid-column: span 12; }
  .two-col { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .header { padding: 20px; }
  .main { padding: 20px; }
  .header h1 { font-size: 34px; }
  .timeline-row { grid-template-columns: 86px 1fr; gap: 12px; }
}
</style>
</head>
<body>

const nav = document.getElementById('nav');
const pages = document.querySelectorAll('.page');

  btn.className = 'tab' + (index === 0 ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    pages.forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  };
  nav.appendChild(btn);
});
