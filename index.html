<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Ops Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ee;
  --panel: rgba(255,255,255,0.75);
  --text: #2f2d29;
  --muted: #6f6b63;
  --sage: #8aa38d;
  --line: rgba(111,139,115,0.18);
}
body {
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  background: linear-gradient(180deg,#faf8f4,#f1ede6);
}
.header {
  padding:24px;
  border-bottom:1px solid var(--line);
}
.header h1 {
  margin:0;
  font-family:'Cormorant Garamond',serif;
  font-size:36px;
}
.nav { display:flex; gap:10px; margin-top:12px; }
.tab { padding:8px 14px; border-radius:20px; background:#eee; cursor:pointer; }
.tab.active { background:var(--sage); color:#fff; }
.main { padding:24px; }
.card {
  background:var(--panel);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
h2 { font-family:'Cormorant Garamond',serif; }
.hidden { display:none; }
</style>
</head>
<body>

<div class="header">
  <h1>Wedding Ops Hub</h1>
  <div class="nav" id="nav"></div>
</div>

<div class="main">
  <section id="dashboard"></section>
  <section id="groom" class="hidden"></section>
  <section id="packing" class="hidden"></section>
</div>

<script>
const tabs = [
  ['dashboard','Dashboard'],
  ['groom','Groom Timeline'],
  ['packing','Packing Checklist']
];

const nav = document.getElementById('nav');
const pages = document.querySelectorAll('section');

tabs.forEach(([id,label],i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.innerText=label;
  btn.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    pages.forEach(p=>p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  };
  nav.appendChild(btn);
});

// DASHBOARD

document.getElementById('dashboard').innerHTML=`
<div class="card">
<h2>Next Critical</h2>
<p>Nikah – Departure 3:00 PM</p>
</div>
`;

// GROOM TIMELINE

document.getElementById('groom').innerHTML=`
<div class="card">
<h2>Nikah Groom Timeline</h2>

<p><strong>9:00</strong> Wake up</p>
<p><strong>9:30–10:30</strong> Shower + prep</p>
<p><strong>10:30–11:30</strong> Setup + checks</p>
<p><strong>12:00</strong> Start dressing</p>
<p><strong>1:15–1:45</strong> Buffer</p>
<p><strong>1:45–2:15</strong> Photos</p>
<p><strong>2:15–2:40</strong> Send-off</p>
<p><strong>2:40–3:00</strong> Final checks</p>
<p><strong>3:00</strong> DEPART</p>
<p><strong>4:00–4:30</strong> First look</p>
<p><strong>4:45</strong> Arrival buffer</p>

</div>
`;

// PACKING

document.getElementById('packing').innerHTML=`
<div class="card">
<h2>Packing Checklist</h2>

<h3>Outfits</h3>
<ul>
<li>Nikah outfit</li>
<li>Reception outfit</li>
<li>Casual clothes</li>
<li>Nightwear</li>
<li>Return outfit</li>
</ul>

<h3>Accessories</h3>
<ul>
<li>Watch</li>
<li>Cufflinks</li>
<li>Perfume</li>
<li>Tie / bow</li>
</ul>

<h3>Essentials</h3>
<ul>
<li>Phone charger</li>
<li>Portable charger</li>
<li>Mints</li>
<li>Comb</li>
<li>Deodorant</li>
</ul>

</div>
`;

</script>

</body>
</html>
